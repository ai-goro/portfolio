<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>妊娠週数トラッカー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#F8BBD0;--pink-light:#FCE4EC;--pink-dark:#EC407A;
  --beige:#FFF8E1;--beige-dark:#FFECB3;
  --peach:#FFCCBC;--peach-dark:#FF8A65;
  --text:#5D4037;--text-light:#8D6E63;--text-lighter:#BCAAA4;
  --white:#FFFDF9;--card-bg:#FFFFFF;
  --shadow:0 4px 20px rgba(0,0,0,0.06);
  --radius:20px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Hiragino Maru Gothic Pro','Rounded Mplus 1c','Yu Gothic','Meiryo',sans-serif;
  background:linear-gradient(135deg,var(--pink-light)0%,var(--beige)50%,var(--peach)100%);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
.page{
  position:absolute;top:0;left:0;width:100%;height:100%;
  overflow-y:auto;overflow-x:hidden;
  transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .5s ease;
  -webkit-overflow-scrolling:touch;
}
.page.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.page.slide-left{transform:translateX(-100%);opacity:0;pointer-events:none}

/* ===== PAGE 1: SETUP ===== */
.setup-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px}
.setup-logo{margin-bottom:8px}
.setup-title{font-size:26px;font-weight:700;color:var(--pink-dark);margin-bottom:4px;text-align:center}
.setup-subtitle{font-size:14px;color:var(--text-light);margin-bottom:28px;text-align:center}
.setup-card{
  background:var(--card-bg);border-radius:var(--radius);padding:28px 24px;
  width:100%;max-width:380px;box-shadow:var(--shadow);
}
.field-label{font-size:13px;font-weight:700;color:var(--text-light);margin-bottom:8px;display:block}
.field-input{
  width:100%;padding:14px 16px;border:2px solid var(--beige-dark);border-radius:14px;
  font-size:16px;color:var(--text);background:var(--beige);outline:none;
  font-family:inherit;transition:border-color .3s;
}
.field-input:focus{border-color:var(--pink)}
.method-group{margin:20px 0}
.method-option{
  display:flex;align-items:center;padding:14px 16px;margin-bottom:10px;
  border:2px solid var(--beige-dark);border-radius:14px;cursor:pointer;
  background:var(--white);transition:all .3s;
}
.method-option:hover,.method-option.active{border-color:var(--pink);background:var(--pink-light)}
.method-option .radio{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--text-lighter);
  margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.method-option.active .radio{border-color:var(--pink-dark);background:var(--pink-dark)}
.method-option.active .radio::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}
.method-option .label{font-size:14px;font-weight:600;color:var(--text)}
.sub-input{
  margin-top:12px;padding:16px;background:var(--beige);border-radius:14px;
  display:none;animation:fadeIn .3s;
}
.sub-input.show{display:block}
.date-input{
  width:100%;padding:12px 14px;border:2px solid var(--beige-dark);border-radius:12px;
  font-size:16px;color:var(--text);background:#fff;outline:none;font-family:inherit;
}
.date-input:focus{border-color:var(--pink)}
.manual-row{display:flex;align-items:center;gap:8px}
.manual-input{
  width:70px;padding:12px;border:2px solid var(--beige-dark);border-radius:12px;
  font-size:18px;text-align:center;color:var(--text);background:#fff;outline:none;
}
.manual-input:focus{border-color:var(--pink)}
.manual-label{font-size:16px;color:var(--text-light);font-weight:600}
.btn-start{
  width:100%;padding:16px;margin-top:24px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--pink-dark),var(--peach-dark));
  color:#fff;font-size:18px;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 4px 16px rgba(236,64,122,.3);
  transition:transform .2s,box-shadow .2s;
}
.btn-start:active{transform:scale(.97);box-shadow:0 2px 8px rgba(236,64,122,.2)}
.btn-start:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:#E53935;font-size:12px;margin-top:6px;display:none}

/* ===== PAGE 2: MAIN ===== */
.main-page{background:transparent}
.main-header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--pink-dark),#F06292);
  padding:16px 20px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(236,64,122,.2);
}
.header-info h1{font-size:20px;font-weight:700}
.header-info p{font-size:12px;opacity:.85;margin-top:2px}
.btn-settings{
  width:44px;height:44px;border:none;border-radius:50%;
  background:rgba(255,255,255,.2);color:#fff;font-size:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .3s;
}
.btn-settings:hover{background:rgba(255,255,255,.35)}

.main-content{padding:20px 16px 100px}

/* Baby Card */
.baby-card{
  background:var(--card-bg);border-radius:var(--radius);padding:28px 20px;
  text-align:center;box-shadow:var(--shadow);margin-bottom:16px;
  position:relative;overflow:hidden;
}
.baby-card::before{
  content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(248,187,208,.3),transparent);border-radius:50%;
}
.baby-week-badge{
  display:inline-block;padding:6px 20px;border-radius:30px;
  background:linear-gradient(135deg,var(--pink-dark),#F06292);
  color:#fff;font-size:13px;font-weight:700;margin-bottom:16px;
}
.baby-svg-wrap{
  width:180px;height:180px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle,var(--pink-light),transparent 70%);
  border-radius:50%;
}
.baby-svg-wrap svg{width:100%;height:100%}
.baby-size{font-size:15px;color:var(--text-light);margin-top:4px;line-height:1.7}
.baby-size strong{color:var(--pink-dark);font-size:17px}

/* Info Cards */
.info-card{
  background:var(--card-bg);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px;
}
.info-card-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.info-icon{
  width:40px;height:40px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.info-card-header h3{font-size:15px;font-weight:700;color:var(--text)}
.info-card p{font-size:14px;color:var(--text-light);line-height:1.8}
.icon-health{background:#E8F5E9}
.icon-nutrition{background:#FFF3E0}
.icon-mama{background:#FCE4EC}
.icon-papa{background:#E3F2FD}

/* Dialog */
.dialog-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;
  background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;
  animation:fadeIn .3s;
}
.dialog-overlay.show{display:flex}
.dialog-box{
  background:var(--card-bg);border-radius:var(--radius);padding:28px 24px;
  width:90%;max-width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15);
  animation:popIn .3s cubic-bezier(.4,0,.2,1);
}
.dialog-box h3{font-size:17px;margin-bottom:8px;color:var(--text)}
.dialog-box p{font-size:14px;color:var(--text-light);margin-bottom:20px}
.dialog-btns{display:flex;gap:10px;justify-content:center}
.dialog-btns button{
  flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;
  font-weight:700;cursor:pointer;font-family:inherit;transition:transform .2s;
}
.dialog-btns button:active{transform:scale(.96)}
.btn-yes{background:var(--pink-dark);color:#fff}
.btn-no{background:var(--beige);color:var(--text)}

/* Celebration Overlay */
.celebration-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;
  display:none;align-items:center;justify-content:center;
  background:rgba(255,253,249,.92);
}
.celebration-overlay.show{display:flex}
.celebration-content{
  text-align:center;padding:40px 24px;animation:popIn .6s cubic-bezier(.4,0,.2,1);
}
.celebration-emoji{font-size:60px;margin-bottom:16px;animation:bounce 1s infinite}
.celebration-title{font-size:24px;font-weight:700;color:var(--pink-dark);margin-bottom:8px}
.celebration-msg{font-size:15px;color:var(--text-light);line-height:1.8;margin-bottom:24px}
.btn-close-celebration{
  padding:14px 40px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--pink-dark),var(--peach-dark));
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 4px 16px rgba(236,64,122,.3);
}
.btn-close-celebration:active{transform:scale(.96)}

/* Confetti Canvas */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:610;pointer-events:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.float-anim{animation:float 3s ease-in-out infinite}
</style>
</head>
<body>

<!-- ===== SETUP PAGE ===== -->
<div id="page-setup" class="page">
<div class="setup-page">
  <div class="setup-logo">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="34" fill="#FCE4EC" stroke="#F8BBD0" stroke-width="2"/>
      <text x="36" y="44" text-anchor="middle" font-size="36">🤰</text>
    </svg>
  </div>
  <div class="setup-title">マタニティ ダイアリー</div>
  <div class="setup-subtitle">あなたの妊娠生活をやさしくサポート</div>

  <div class="setup-card">
    <label class="field-label">ニックネーム</label>
    <input type="text" id="nickname" class="field-input" placeholder="例：はなちゃん" maxlength="20">

    <div class="method-group">
      <label class="field-label">週数の計算方法</label>
      <div class="method-option" data-method="lmp" onclick="selectMethod('lmp')">
        <div class="radio"></div>
        <div class="label">① 最終月経日から自動計算</div>
      </div>
      <div id="sub-lmp" class="sub-input">
        <label class="field-label">最終月経開始日</label>
        <input type="date" id="input-lmp" class="date-input">
      </div>

      <div class="method-option" data-method="edd" onclick="selectMethod('edd')">
        <div class="radio"></div>
        <div class="label">② 出産予定日から自動計算</div>
      </div>
      <div id="sub-edd" class="sub-input">
        <label class="field-label">出産予定日</label>
        <input type="date" id="input-edd" class="date-input">
      </div>

      <div class="method-option" data-method="manual" onclick="selectMethod('manual')">
        <div class="radio"></div>
        <div class="label">③ 週数・日数を手動入力</div>
      </div>
      <div id="sub-manual" class="sub-input">
        <div class="manual-row">
          <input type="number" id="input-week" class="manual-input" min="1" max="42" placeholder="0">
          <span class="manual-label">週</span>
          <input type="number" id="input-day" class="manual-input" min="0" max="6" placeholder="0">
          <span class="manual-label">日</span>
        </div>
      </div>
    </div>

    <div id="error" class="error-msg"></div>
    <button class="btn-start" onclick="startApp()">はじめる ✨</button>
  </div>
</div>
</div>

<!-- ===== MAIN PAGE ===== -->
<div id="page-main" class="page hidden">
  <div class="main-header">
    <div class="header-info">
      <h1 id="header-title"></h1>
      <p id="header-sub"></p>
    </div>
    <button class="btn-settings" onclick="showDialog()">⚙️</button>
  </div>
  <div class="main-content" id="main-content"></div>
</div>

<!-- Dialog -->
<div class="dialog-overlay" id="dialog">
  <div class="dialog-box">
    <h3>プロフィール設定</h3>
    <p>設定画面に戻りますか？</p>
    <div class="dialog-btns">
      <button class="btn-no" onclick="closeDialog()">いいえ</button>
      <button class="btn-yes" onclick="goToSetup()">はい</button>
    </div>
  </div>
</div>

<!-- Celebration -->
<div class="celebration-overlay" id="celebration">
  <div class="celebration-content">
    <div class="celebration-emoji" id="celeb-emoji">🎉</div>
    <div class="celebration-title" id="celeb-title"></div>
    <div class="celebration-msg" id="celeb-msg"></div>
    <button class="btn-close-celebration" onclick="closeCelebration()">ありがとう ♡</button>
  </div>
</div>
<canvas id="confetti-canvas"></canvas>

// ===== SVG GENERATOR =====
function generateBabySVG(week){
  const w = Math.min(Math.max(week,1),42);
  if(w<=4) return svgEgg(w);
  if(w<=8) return svgBean(w);
  if(w<=12) return svgSmallBaby(w);
  if(w<=20) return svgMedBaby(w);
  if(w<=30) return svgGrowingBaby(w);
  return svgFullBaby(w);
}

// ===== CONFETTI =====
function launchConfetti(duration=3000){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#F8BBD0','#FFCCBC','#FFAB91','#F48FB1','#FF80AB','#FFE0B2','#B39DDB','#81D4FA'];
  const particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height*-0.5,
      w:Math.random()*8+4,h:Math.random()*6+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*3,vy:Math.random()*3+2,
      rot:Math.random()*360,vr:(Math.random()-0.5)*10,
      opacity:1
    });
  }
  const start=Date.now();
  function draw(){
    const elapsed=Date.now()-start;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const fade=elapsed>duration-800?Math.max(0,1-(elapsed-(duration-800))/800):1;
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.opacity*fade;
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(elapsed<duration)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ===== APP STATE =====
let state={nickname:'',method:'',lmpDate:null,eddDate:null,manualWeek:0,manualDay:0,manualSetDate:null,
  firstVisit:true,lastSeenWeek:0};

function saveState(){
  const s={...state};
  if(s.lmpDate)s.lmpDate=s.lmpDate.toISOString();
  if(s.eddDate)s.eddDate=s.eddDate.toISOString();
  if(s.manualSetDate)s.manualSetDate=s.manualSetDate.toISOString();
  try{localStorage.setItem('pregnancy_tracker',JSON.stringify(s));}catch(e){}
}

function loadState(){
  try{
    const d=localStorage.getItem('pregnancy_tracker');
    if(!d)return false;
    const s=JSON.parse(d);
    state={...s};
    if(state.lmpDate)state.lmpDate=new Date(state.lmpDate);
    if(state.eddDate)state.eddDate=new Date(state.eddDate);
    if(state.manualSetDate)state.manualSetDate=new Date(state.manualSetDate);
    return true;
  }catch(e){return false}
}

function calcWeekDay(){
  const now=new Date();now.setHours(0,0,0,0);
  let totalDays=0;
  if(state.method==='lmp'){
    const lmp=new Date(state.lmpDate);lmp.setHours(0,0,0,0);
    totalDays=Math.floor((now-lmp)/(1000*60*60*24));
  }else if(state.method==='edd'){
    const edd=new Date(state.eddDate);edd.setHours(0,0,0,0);
    totalDays=280-Math.floor((edd-now)/(1000*60*60*24));
  }else if(state.method==='manual'){
    const setDate=new Date(state.manualSetDate);setDate.setHours(0,0,0,0);
    const elapsed=Math.floor((now-setDate)/(1000*60*60*24));
    totalDays=state.manualWeek*7+state.manualDay+elapsed;
  }
  totalDays=Math.max(0,totalDays);
  const week=Math.floor(totalDays/7);
  const day=totalDays%7;
  return{week:Math.min(Math.max(week,0),42),day};
}

// ===== UI FUNCTIONS =====
let selectedMethod='';

function selectMethod(m){
  selectedMethod=m;
  document.querySelectorAll('.method-option').forEach(el=>{
    el.classList.toggle('active',el.dataset.method===m);
  });
  document.querySelectorAll('.sub-input').forEach(el=>el.classList.remove('show'));
  const sub=document.getElementById('sub-'+m);
  if(sub)sub.classList.add('show');
}

function showError(msg){
  const el=document.getElementById('error');
  el.textContent=msg;el.style.display=msg?'block':'none';
}

function startApp(){
  showError('');
  const nick=document.getElementById('nickname').value.trim();
  if(!nick){showError('ニックネームを入力してください');return}
  if(!selectedMethod){showError('計算方法を選んでください');return}

  state.nickname=nick;state.method=selectedMethod;

  if(selectedMethod==='lmp'){
    const v=document.getElementById('input-lmp').value;
    if(!v){showError('最終月経開始日を入力してください');return}
    state.lmpDate=new Date(v);
  }else if(selectedMethod==='edd'){
    const v=document.getElementById('input-edd').value;
    if(!v){showError('出産予定日を入力してください');return}
    state.eddDate=new Date(v);
  }else{
    const w=parseInt(document.getElementById('input-week').value)||0;
    const d=parseInt(document.getElementById('input-day').value)||0;
    if(w<1||w>42){showError('週数は1〜42の間で入力してください');return}
    if(d<0||d>6){showError('日数は0〜6の間で入力してください');return}
    state.manualWeek=w;state.manualDay=d;state.manualSetDate=new Date();
  }

  const isFirst=state.firstVisit;
  state.firstVisit=false;
  saveState();

  // Transition
  document.getElementById('page-setup').classList.add('slide-left');
  document.getElementById('page-main').classList.remove('hidden');

  renderMain();

  if(isFirst){
    setTimeout(()=>showCelebration(milestoneMessages[1]||{emoji:'🎉',title:'妊娠おめでとうございます！',msg:'素敵な旅の始まりです。'}),600);
  }else{
    checkMilestone();
  }
}

function renderMain(){
  const{week,day}=calcWeekDay();
  const displayWeek=Math.max(week,1);
  const idx=Math.min(displayWeek,42)-1;
  const data=weeklyData[idx];

  document.getElementById('header-title').textContent=`${state.nickname}さん、${displayWeek}週目`;
  document.getElementById('header-sub').textContent=`${displayWeek}週${day}日 — ${trimesterLabel(displayWeek)}`;

  const edd=calcEDD();
  const remaining=edd?daysUntil(edd):-1;

  const html=`
    <div class="baby-card float-anim">
      <div class="baby-week-badge">${displayWeek}週${day}日</div>
      <div class="baby-svg-wrap">${generateBabySVG(displayWeek)}</div>
      <div class="baby-size"><strong>${data.size}</strong><br>${data.sizeDetail}</div>
      ${remaining>0?`<div style="margin-top:12px;font-size:13px;color:var(--text-lighter)">出産予定日まであと約 <strong style="color:var(--pink-dark)">${remaining}日</strong></div>`:''}
    </div>
    <div class="info-card">
      <div class="info-card-header"><div class="info-icon icon-health">🏥</div><h3>体調管理アドバイス</h3></div>
      <p>${data.health}</p>
    </div>
    <div class="info-card">
      <div class="info-card-header"><div class="info-icon icon-nutrition">🥗</div><h3>必要な栄養・食事</h3></div>
      <p>${data.nutrition}</p>
    </div>
    <div class="info-card">
      <div class="info-card-header"><div class="info-icon icon-mama">💕</div><h3>先輩ママからのひとこと</h3></div>
      <p>${data.mama}</p>
    </div>
    <div class="info-card">
      <div class="info-card-header"><div class="info-icon icon-papa">👔</div><h3>パパへのアドバイス</h3></div>
      <p>${data.papa}</p>
    </div>
  `;
  document.getElementById('main-content').innerHTML=html;
}

function trimesterLabel(w){
  if(w<=13)return '初期（第1三半期）';
  if(w<=27)return '中期（第2三半期）';
  return '後期（第3三半期）';
}

function calcEDD(){
  if(state.method==='lmp'&&state.lmpDate){
    const d=new Date(state.lmpDate);d.setDate(d.getDate()+280);return d;
  }
  if(state.method==='edd'&&state.eddDate)return new Date(state.eddDate);
  return null;
}

function daysUntil(d){
  const now=new Date();now.setHours(0,0,0,0);
  const target=new Date(d);target.setHours(0,0,0,0);
  return Math.max(0,Math.ceil((target-now)/(1000*60*60*24)));
}

function checkMilestone(){
  const{week}=calcWeekDay();
  const displayWeek=Math.max(week,1);
  if(displayWeek!==state.lastSeenWeek&&milestoneMessages[displayWeek]){
    state.lastSeenWeek=displayWeek;saveState();
    setTimeout(()=>showCelebration(milestoneMessages[displayWeek]),800);
  }else{
    state.lastSeenWeek=displayWeek;saveState();
  }
}

function showCelebration(data){
  document.getElementById('celeb-emoji').textContent=data.emoji;
  document.getElementById('celeb-title').textContent=data.title;
  document.getElementById('celeb-msg').innerHTML=data.msg.replace(/\n/g,'<br>');
  document.getElementById('celebration').classList.add('show');
  launchConfetti(4000);
}

function closeCelebration(){
  document.getElementById('celebration').classList.remove('show');
}

function showDialog(){
  document.getElementById('dialog').classList.add('show');
}

function closeDialog(){
  document.getElementById('dialog').classList.remove('show');
}

function goToSetup(){
  closeDialog();
  document.getElementById('page-main').classList.add('hidden');
  document.getElementById('page-setup').classList.remove('slide-left');
  // Pre-fill
  document.getElementById('nickname').value=state.nickname;
  if(state.method)selectMethod(state.method);
  if(state.lmpDate)document.getElementById('input-lmp').value=state.lmpDate.toISOString().split('T')[0];
  if(state.eddDate)document.getElementById('input-edd').value=state.eddDate.toISOString().split('T')[0];
  if(state.method==='manual'){
    document.getElementById('input-week').value=state.manualWeek;
    document.getElementById('input-day').value=state.manualDay;
  }
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded',()=>{
  if(loadState()&&state.nickname&&state.method&&!state.firstVisit){
    document.getElementById('page-setup').classList.add('slide-left');
    document.getElementById('page-main').classList.remove('hidden');
    renderMain();
    checkMilestone();
  }
});
